function makeIcon(color, size = 16) {
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function popup(title, tag, tagColor, tagBg, desc, features, website, props = '') {
  const featHtml = features.map(f => `<span class="popup-feature">${f}</span>`).join('');
  return `<div class="popup-title">${title}</div>
<span class="popup-tag" style="color:${tagColor};background:${tagBg}">${tag}</span>
<div class="popup-desc">${desc}</div>
<div class="popup-features">${featHtml}</div>
${props ? `<div style="margin-top:6px;font-size:12px;color:#666">${props}</div>` : ''}
${website ? `<div style="margin-top:8px"><a class="popup-link" href="${website}" target="_blank">→ Visit website</a></div>` : ''}`;
